name: Secure Release Compiler

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.target }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            arch: arm64
            target: mac
            output_name: TeamsEcho-macos-v1.0.8.zip
            
          - os: macos-14
            arch: x64
            target: mac
            output_name: TeamsEcho-intel-v1.0.8.zip

          - os: windows-latest
            arch: x64
            target: win
            output_name: TeamsEcho-windows-v1.0.8.zip

    steps:
      - name: 1. 检出源代码
        uses: actions/checkout@v4

      - name: 2. 初始化 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 3. 安装依赖
        run: npm ci

      - name: 4. 执行自动化编译 (沙箱纯本地化构建)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          ELECTRON_BUILDER_ALLOW_UNTRUSTED_CA: true
        run: |
          npx electron-builder --${{ matrix.target }} --${{ matrix.arch }} --publish never

      - name: 5. 重命名 macOS 安装包
        if: matrix.target == 'mac'
        run: |
          cd dist
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            mv *arm64*.zip ${{ matrix.output_name }} || mv *.zip ${{ matrix.output_name }}
          else
            mv *x64*.zip ${{ matrix.output_name }} || mv *.zip ${{ matrix.output_name }}
          fi

      - name: 6. 重命名 Windows 安装包
        if: matrix.target == 'win'
        shell: bash
        run: |
          cd dist
          mv *.zip ${{ matrix.output_name }}

      - name: 7. 生成 SHA-256 校验码 (macOS)
        if: matrix.target == 'mac'
        run: |
          cd dist
          shasum -a 256 ${{ matrix.output_name }} > ${{ matrix.output_name }}.sha256

      - name: 8. 生成 SHA-256 校验码 (Windows)
        if: matrix.target == 'win'
        shell: bash
        run: |
          cd dist
          sha256sum ${{ matrix.output_name }} > ${{ matrix.output_name }}.sha256

      - name: 9. 暂存编译产物
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.arch }}-${{ matrix.target }}
          path: |
            dist/${{ matrix.output_name }}
            dist/${{ matrix.output_name }}.sha256
          retention-days: 1

  publish:
    name: Public Secure Release Artifacts
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 1. 下载所有二进制包
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: 2. 汇总发布清单
        run: |
          mkdir release-dir
          find all-artifacts -type f -exec cp {} release-dir/ \;
          cd release-dir
          echo "### TeamsEcho v1.0.8 SHA-256 Checksums" > csm-manifest.txt
          cat *.sha256 >> csm-manifest.txt
          rm *.sha256

      - name: 3. 发布到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: "release-dir/*"
          body_path: release-dir/csm-manifest.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
