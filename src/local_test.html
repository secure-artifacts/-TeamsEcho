<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>TeamsEcho 极致居中大字版自测舱</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f7; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .container { display: flex; flex: 1; padding: 15px; gap: 15px; filter: blur(2px); }
    .left-panel { width: 25%; display: flex; flex-direction: column; background: white; border-radius: 8px; padding: 10px; opacity: 0.5; }
    .right-panel { width: 75%; display: flex; flex-direction: column; background: white; border-radius: 8px; padding: 15px; justify-content: space-between; opacity: 0.5; }
    label { font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; display: block; }
    textarea { flex: 1; width: 93%; resize: none; border: 1px solid #d1d1d6; border-radius: 6px; padding: 8px; }
    .rich-editor { flex: 1; border: 1px solid #d1d1d6; border-radius: 6px; padding: 12px; font-size: 14px; background: #fff; margin-bottom: 15px; }
    
    /* 核心精简优化后的高级弹窗 */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); display: flex; align-items: center; justify-content: center; z-index: 9999; }
    .modal-box { width: 560px; background: #ffffff; border-radius: 14px; box-shadow: 0 12px 36px rgba(0,0,0,0.3); padding: 26px; box-sizing: border-box; }
    
    /* 极致放大、醒目、100% 居中的💡 警示核心区 */
    .modal-body { font-size: 22px; font-weight: 700; color: #d9383a; line-height: 1.6; background: #fff2f2; padding: 22px; border-radius: 10px; border: 1px solid #ffcccc; margin-bottom: 24px; text-align: center; }
    
    /* 按钮基础样式：尺寸缩小、精细化 */
    .action-btn { padding: 10px 16px; border-radius: 6px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.15s; display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
    
    /* 第一层：左右并排 */
    .row-actions { display: flex; gap: 14px; justify-content: space-between; margin-bottom: 16px; }
    .btn-confirm { flex: 1; background: #34c759; color: white; }
    .btn-confirm:hover { background: #28a745; }
    .btn-switch { flex: 1; background: #e5e5ea; color: #1c1c1e; border: 1px solid #d1d1d6; }
    .btn-switch:hover { background: #d1d1d6; }
    
    /* 第二层：底部独立居中取消 */
    .footer-action { text-align: center; border-top: 1px solid #e5e5ea; padding-top: 14px; }
    .btn-cancel { width: 40%; background: #ff3b30; color: white; }
    .btn-cancel:hover { background: #dc3545; }
    
    /* 功能触发状态小字提示 */
    .toast-indicator { text-align: center; font-size: 12px; font-weight: bold; color: #007aff; margin-top: 8px; min-height: 18px; }
  </style>
</head>
<body>

  <div class="modal-overlay" id="safetyModal">
    <div class="modal-box">
      <div class="modal-body">
        💡 请核对：<br>
        此时前台的 Teams 聊天框是否已经是带有格式工具栏的「富文本大框」？
      </div>
      
      <div class="modal-actions">
        <div class="row-actions">
          <button class="action-btn btn-confirm" id="confirmBtn" autofocus>
            ✅ [ 是大框请发送 ]
          </button>
          <button class="action-btn btn-switch" id="switchBtn">
            🔄 [ 一键切换大框 ]
          </button>
        </div>
        
        <div class="footer-action">
          <button class="action-btn btn-cancel" id="cancelBtn">
            ❌ [ 取消发送 ]
          </button>
        </div>
        
        <div class="toast-indicator" id="toastIndicator"></div>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="left-panel"><label>👥 名单输入</label><textarea disabled></textarea></div>
    <div class="right-panel"><div style="flex:1; display:flex; flex-direction:column;"><label>💬 消息内容</label><div class="rich-editor"></div></div></div>
  </div>

  <script>
    const confirmBtn = document.getElementById('confirmBtn');
    const switchBtn = document.getElementById('switchBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const toast = document.getElementById('toastIndicator');

    // 默认聚焦绿色按钮，方便回车直发
    confirmBtn.focus();

    // 1. 真实发送功能模拟
    confirmBtn.addEventListener('click', () => {
      toast.style.color = '#34c759';
      toast.innerText = '⚡️ 真实功能触发：弹窗正在关闭，极速动作链正在向 Teams 连续全自动贴人名...';
      setTimeout(() => { window.close(); }, 1200);
    });

    // 2. 真实盲切功能模拟（保持弹窗不关闭）
    switchBtn.addEventListener('click', () => {
      toast.style.color = '#007aff';
      toast.innerText = '⚙️ 真实功能触发：正在向后台发送 Cmd+Shift+X 模拟指令。弹窗保持锁定，请肉眼核对。';
    });

    // 3. 真实安全拦截模拟
    cancelBtn.addEventListener('click', () => {
      toast.style.color = '#ff3b30';
      toast.innerText = '❌ 真实功能触发：已切断所有自动化进程，返回主界面。';
      setTimeout(() => { window.close(); }, 1000);
    });
  </script>
</body>
</html>
